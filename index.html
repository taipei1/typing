<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Тренажер печати</title>
  <style>
/* ── Шрифты ─────────────────────────────────────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

/* ── Переменные (ЗЕЛЕНЫЙ СТИЛЬ + БЕЛЫЙ ТЕКСТ) ─────────────────────────── */
:root {
  --bg:      #0f100f;
  --surface: #181b18;
  --border:  #2a2e2a;
  --muted:   #6b746b;
  --text:    #ffffff; /* Цвет изменен с сероватого на чисто белый */
  --accent:  #3aae72; 
  --good:    #3aae72; 
  --bad:     #e05c3a; 
  --r:       6px;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'IBM Plex Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}

.wrap { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }

h1 { font-family: var(--mono); font-size: 1.9rem; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 4px; }
h1 .accent { color: var(--accent); }
h2 { font-family: var(--mono); font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.sub { color: var(--muted); font-size: .9rem; margin-bottom: 28px; }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 22px 24px; margin-bottom: 20px; }

.row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px 14px; margin-bottom: 18px; }
.toggle-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: .88rem; color: var(--muted); }
.toggle-label input { accent-color: var(--accent); }
input[type="range"] { accent-color: var(--accent); width: 80px; }

select, input[type="date"], input[type="number"].f-input {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  border-radius: var(--r); padding: 4px 8px; font-family: var(--sans); font-size: .88rem; cursor: pointer;
}

/* ── Фильтр ─────────────────────────────────────────────────────────────── */
.filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }

#filter-panel {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  margin-bottom: 16px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px 20px;
}
#filter-panel label { font-size: .8rem; color: var(--muted); display: flex; flex-direction: column; gap: 4px; }
#filter-panel .f-row { display: flex; gap: 6px; align-items: center; }
#filter-panel select, #filter-panel input { width: 100%; }
.filter-actions { display: flex; gap: 8px; grid-column: 1/-1; }

/* ── Buttons ─────────────────────────────────────────────────────────────── */
button {
  background: transparent; border: 1px solid var(--border); color: var(--text);
  border-radius: var(--r); padding: 5px 14px; font-family: var(--sans); font-size: .88rem;
  cursor: pointer; transition: border-color .15s, color .15s;
}
button:hover { border-color: var(--accent); color: var(--accent); }
button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
button.primary:hover { background: #2e8c5b; border-color: #2e8c5b; color: #fff; }
button:disabled { opacity: .4; cursor: not-allowed; }
button.active { border-color: var(--accent); color: var(--accent); }

.timer { font-family: var(--mono); font-size: 1.1rem; font-weight: 600; letter-spacing: .05em; color: var(--accent); min-width: 48px; }

/* ── Target ──────────────────────────────────────────────────────────────── */
.prompt-line { font-size: .75rem; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }
.target { font-family: var(--mono); font-size: 2.4rem; font-weight: 600; letter-spacing: -.02em; margin-bottom: 6px; min-height: 3rem; line-height: 1.2; color: #ffffff; }
.srs-state { font-size: .8rem; margin-bottom: 14px; min-height: 1.2em; font-family: var(--mono); }

/* ── Input ───────────────────────────────────────────────────────────────── */
#input {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r);
  color: #ffffff; /* Принудительно белый текст для ввода */
  font-family: var(--mono); font-size: 1.2rem; padding: 10px 14px;
  outline: none; transition: background-color .1s, border-color .1s; margin-bottom: 6px;
}

#input:focus { border-color: var(--accent); }

#input.bad { 
  background: #2a1410 !important; 
  border-color: var(--border); 
}

#input:disabled { opacity: .35; }

.hint-inline { font-family: var(--mono); font-size: .85rem; min-height: 1.2em; margin-bottom: 14px; }

/* ── Stats ───────────────────────────────────────────────────────────────── */
.stats { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
.stat { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); padding: 8px 14px; min-width: 72px; text-align: center; }
.stat .val { font-family: var(--mono); font-size: 1.2rem; font-weight: 600; line-height: 1.2; color: #ffffff; }
.stat .lbl { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }
.score-stat { border-color: var(--accent); }
.score-stat .val { color: var(--accent); }

/* ── Vocab panel ──────────────────────────────────────────────────────────── */
textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r);
  color: #ffffff; font-family: var(--mono); font-size: .85rem; padding: 10px 12px;
  resize: vertical; outline: none; transition: border-color .12s; margin-bottom: 10px;
}
textarea:focus { border-color: var(--accent); }

.actions { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 18px; }

.add-flash { font-size: .85rem; color: var(--good); opacity: 0; transition: opacity .2s; font-family: var(--mono); }
.add-flash.show  { opacity: 1; }
.add-flash.error { color: var(--bad); }

/* ── DB list ──────────────────────────────────────────────────────────────── */
.db-list { overflow-x: auto; }
.db-row { display: grid; grid-template-columns: 1.6fr 1.6fr 70px 60px 90px 130px; border-bottom: 1px solid var(--border); align-items: center; font-size: .82rem; }
.db-row > div { padding: 7px 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #ffffff; }
.db-head { color: var(--muted); font-size: .75rem; text-transform: uppercase; letter-spacing: .06em; position: sticky; top: 0; background: var(--surface); z-index: 1; }
.db-head [data-sort-key] { cursor: pointer; user-select: none; }
.db-head [data-sort-key]:hover { color: #ffffff; }
.db-row:last-child { border-bottom: none; }
.db-row:not(.db-head):hover { background: #1c201c; }

.db-cell-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid transparent; color: #ffffff; font-family: var(--mono); font-size: .82rem; padding: 2px 0; outline: none; }
.db-cell-input:focus { border-bottom-color: var(--accent); }
.db-row button { padding: 3px 8px; font-size: .75rem; margin-right: 4px; }

.muted { color: var(--muted); }

@media (max-width: 600px) {
  .target { font-size: 1.8rem; }
  .db-row { grid-template-columns: 1fr 1fr 52px 44px 72px 100px; font-size: .75rem; }
  .stats { gap: 6px; }
  .stat { padding: 6px 10px; min-width: 60px; }
  .stat .val { font-size: 1rem; }
}
  </style>
</head>
<body>
<div class="wrap">
  <h1>Тренажер<span class="accent">.</span></h1>
  <p class="sub">Скорость печати + правильное написание английских слов</p>

  <div class="panel">
    <div class="row">
      <label class="toggle-label"><input id="speech-enabled" type="checkbox" /> Озвучивать</label>
      <label for="speech-volume" class="muted">Громкость:</label>
      <input id="speech-volume" type="range" min="0" max="100" step="1" value="70" />
      <span id="speech-volume-value" class="muted">70%</span>
      <label for="duration-select" class="muted">Таймер:</label>
      <select id="duration-select">
        <option value="60">1 мин</option>
        <option value="120">2 мин</option>
        <option value="300">5 мин</option>
      </select>
      <button type="button" class="primary" id="btn-start-timer">Старт</button>
      <span class="timer" id="timer">00:00</span>
    </div>

    <div class="filter-bar">
      <button type="button" id="filter-toggle-btn">Фильтр</button>
      <span class="muted" style="font-size:.8rem" id="filter-hint"></span>
    </div>

    <div id="filter-panel" hidden>
      <label>
        Вес
        <div class="f-row">
          <select id="f-weight-op" style="width:60px">
            <option value="">—</option>
            <option value=">=">≥</option>
            <option value="<=">≤</option>
            <option value="=">=</option>
          </select>
          <input id="f-weight-val" class="f-input" type="number" min="1" max="10" value="5" style="width:54px" />
        </div>
      </label>
      <label>
        Добавлено от
        <input id="f-date-from" type="date" />
      </label>
      <label>
        Добавлено до
        <input id="f-date-to" type="date" />
      </label>
      <label>
        Последние N слов
        <input id="f-recent-n" class="f-input" type="number" min="1" placeholder="например 20" />
      </label>
      <label>
        Мин. длина (букв)
        <input id="f-min-len" class="f-input" type="number" min="1" placeholder="например 8" />
      </label>
      <div class="filter-actions">
        <button type="button" id="btn-filter-apply" class="primary">Применить</button>
        <button type="button" id="btn-filter-reset">Сбросить</button>
      </div>
    </div>

    <div class="muted prompt-line">Переведите на английский и напечатайте</div>
    <div id="target" class="target" aria-live="polite"></div>
    <div id="srs-state" class="muted srs-state"></div>
    <input id="input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Начните печатать…" />
    <div id="tab-hint" class="muted hint-inline"></div>
    <div id="stats" class="stats" hidden></div>
  </div>

  <div class="panel">
    <h2>Словарь</h2>
    <textarea id="bulk-import-input" rows="5" placeholder="Добавление слов (массово):&#10;формат: english[TAB]перевод"></textarea>
    <div class="actions">
      <button type="button" id="btn-import-bulk">Добавить</button>
      <button type="button" id="btn-download-db">Скачать JSON</button>
      <span id="add-flash" class="add-flash" aria-live="polite"></span>
    </div>
    <div id="db-list" class="db-list"></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
